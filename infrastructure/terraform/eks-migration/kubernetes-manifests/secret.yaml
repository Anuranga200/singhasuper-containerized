# Kubernetes Secret for Database Credentials
# Stores sensitive configuration data for backend application
# Requirements: 1.4, 3.5, 8.2

# IMPORTANT: Before applying this manifest:
# 1. Replace all placeholder values with actual credentials
# 2. Base64 encode each value (or use stringData instead of data)
# 3. Never commit this file with real credentials to version control

apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: backend
  labels:
    app: backend-api
type: Opaque

# Option 1: Use stringData (Kubernetes will base64 encode automatically)
stringData:
  db_host: "your-rds-endpoint.region.rds.amazonaws.com"
  db_name: "backend_production"
  db_user: "backend_user"
  db_password: "REPLACE_WITH_ACTUAL_PASSWORD"
  jwt_secret: "REPLACE_WITH_ACTUAL_JWT_SECRET"

# Option 2: Use data with base64 encoded values
# Uncomment and use this instead of stringData if you prefer manual encoding
# data:
#   db_host: "eW91ci1yZHMtZW5kcG9pbnQucmVnaW9uLnJkcy5hbWF6b25hd3MuY29t"
#   db_name: "YmFja2VuZF9wcm9kdWN0aW9u"
#   db_user: "YmFja2VuZF91c2Vy"
#   db_password: "UkVQTEFDRV9XSVRIX0FDVFVBTF9QQVNTV09SRA=="
#   jwt_secret: "UkVQTEFDRV9XSVRIX0FDVFVBTF9KV1RfU0VDUkVU"

---
# To base64 encode values manually, use:
# echo -n "your-value" | base64
#
# To decode base64 values:
# echo "encoded-value" | base64 --decode
#
# Example:
# echo -n "my-password" | base64
# Output: bXktcGFzc3dvcmQ=
