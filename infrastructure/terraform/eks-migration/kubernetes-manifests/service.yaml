# Kubernetes Service for Backend Application
# Exposes pods internally within the cluster
# Requirements: 1.2, 3.5

apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: backend
  labels:
    app: backend-api
spec:
  # ClusterIP type - internal service only (not exposed externally)
  # External access is handled by the Ingress resource
  type: ClusterIP
  
  # Selector to match backend pods
  selector:
    app: backend-api
  
  # Port configuration
  ports:
  - port: 80           # Service port (internal)
    targetPort: 3000   # Container port
    protocol: TCP
    name: http
  
  # Session affinity - None means requests are distributed across all pods
  sessionAffinity: None
